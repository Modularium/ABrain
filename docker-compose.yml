version: '3.8'
services:
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: python api_gateway/main.py
    restart: unless-stopped
    env_file: .env
    environment:
      DISPATCHER_URL: http://dispatcher:8001
      SESSION_MANAGER_URL: http://session_manager:8005
      AGENT_REGISTRY_URL: http://registry:8002
      VECTOR_STORE_URL: http://vector_store:8004
      LLM_GATEWAY_URL: http://llm_gateway:8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      retries: 5
    ports:
      - "8000:8000"
    depends_on:
      - dispatcher

  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/task_dispatcher/main.py
    restart: unless-stopped
    env_file: .env
    environment:
      REGISTRY_URL: http://registry:8002
      SESSION_URL: http://session_manager:8005
      ROUTING_URL: http://routing_agent:8111
    depends_on:
      - registry
      - session_manager
      - vector_store
      - llm_gateway
      - routing_agent

  registry:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/agent_registry/main.py
    restart: unless-stopped
    env_file: .env

  session_manager:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/session_manager/main.py
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis

  vector_store:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/vector_store/main.py
    restart: unless-stopped
    env_file: .env
    volumes:
      - vector_data:/data

  llm_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/llm_gateway/main.py
    restart: unless-stopped
    env_file: .env

  routing_agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/routing_agent/main.py
    restart: unless-stopped
    env_file: .env

  user_manager:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/user_manager/main.py
    restart: unless-stopped
    env_file: .env

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api_gateway

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  db:
    image: postgres:14
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  vector_data:
  postgres_data:
